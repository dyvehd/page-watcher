  MyBK:
    name: "HCMUT MyBK"
    api_handler: "site_specific/MyBK_app/handler.py"
    login:
      type: "recipe"
      session_verification_url: "https://mybk.hcmut.edu.vn/app/login?type=cas"
      recipe:
        - action: "navigate"
          url: "http://sso.hcmut.edu.vn/cas/login?service=https%3A%2F%2Fmybk.hcmut.edu.vn%2Fapp%2Flogin%2Fcas"
        - action: "fill"
          selector: "#username"
          value: "YOUR_SSO_USERNAME"
        - action: "fill"
          selector: "#password"
          value: "YOUR_SSO_PASSWORD"
        - action: "click"
          selector: "[type='submit']"
        - action: "wait_for_url"
          value: "https://mybk.hcmut.edu.vn/app/**"
    pages:
