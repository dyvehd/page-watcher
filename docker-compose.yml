version: '3.8'

services:
  page-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: page-watcher
    restart: unless-stopped
    volumes:
      # Mount the configuration file from the host so it can be updated without rebuilding the container
      - ./config.yaml:/app/config.yaml:ro
      # Mount site-specific custom handlers/plugins
      - ./site_specific:/app/site_specific:ro
      # Persist SQLite database on the host
      - ./data:/app/data
      # Save screenshots on the host for access/review
      - ./screenshots:/app/screenshots
    environment:
      # Optional: set timezone inside container for accurate logs (e.g. Asia/Ho_Chi_Minh)
      - TZ=Asia/Ho_Chi_Minh
